<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messaging Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 780px;
    }

    .header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1D9E75;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .header-info p {
      font-size: 12px;
      color: #1D9E75;
    }

    .badge {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: #1a2e26;
      color: #1D9E75;
      border: 1px solid #1D9E75;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    .message {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user .bubble {
      background: #1D9E75;
      color: #fff;
      border-radius: 16px 16px 4px 16px;
    }

    .message.bot .bubble {
      background: #1e1e1e;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-radius: 16px 16px 16px 4px;
    }

    .bubble.typing { color: #666; font-style: italic; }

    .meta {
      font-size: 11px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .intent-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 8px;
      background: #1a2e26;
      color: #1D9E75;
    }

    .chips {
      padding: 0.75rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid #1e1e1e;
    }

    .chip {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      color: #aaa;
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
    }

    .chip:hover {
      border-color: #1D9E75;
      color: #1D9E75;
    }

    .input-row {
      padding: 0.75rem 1.25rem;
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 1px solid #1e1e1e;
    }

    .input-row input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      color: #e8e8e8;
      outline: none;
    }

    .input-row input:focus { border-color: #1D9E75; }
    .input-row input::placeholder { color: #555; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1D9E75;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #0F6E56; }
    .send-btn:disabled { background: #2a2a2a; cursor: not-allowed; }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .divider {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin: 4px 0;
    }
    .bubble h1, .bubble h2, .bubble h3 {
      font-size: 14px;
      font-weight: 600;
      margin: 6px 0 4px;
      color: #e8e8e8;
    }
    .bubble p { margin: 4px 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble strong { color: #fff; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="avatar">MA</div>
      <div class="header-info">
        <h1>Messaging Assistant</h1>
        <p>Powered by RAG </p>
      </div>
      <span class="badge">Demo</span>
    </div>

    <div class="messages" id="messages">
      <div class="divider">today</div>
      <div class="message bot">
        <div class="bubble">Hi! I'm a messaging assistant demo. Ask me anything about the clinic — services, pricing, or hours.</div>
        <div class="meta">now</div>
      </div>
    </div>

    <div class="chips">
      <button class="chip" onclick="sendQ('How much is teeth cleaning?')">Teeth cleaning price</button>
      <button class="chip" onclick="sendQ('What are your opening hours?')">Opening hours</button>
      <button class="chip" onclick="sendQ('What is a root canal?')">What is a root canal?</button>
      <button class="chip" onclick="sendQ('How much are dental implants?')">Implant pricing</button>
      <button class="chip" onclick="sendQ('Where are you located?')">Location</button>
    </div>

    <div class="input-row">
      <input type="text" id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send-btn" id="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, role, intent) {
      const div = document.createElement('div');
      div.className = 'message ' + role;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = marked.parse(text);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = now();

      if (intent) {
        const badge = document.createElement('span');
        badge.className = 'intent-badge';
        badge.textContent = intent;
        meta.appendChild(badge);
      }

      div.appendChild(bubble);
      div.appendChild(meta);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { div, bubble };
    }

    function sendQ(q) {
      inputEl.value = q;
      sendMsg();
    }

    async function sendMsg() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage(text, 'user', null);

      const { div: typingDiv, bubble: typingBubble } = addMessage('typing...', 'bot', null);
      typingBubble.classList.add('typing');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        typingDiv.remove();

        if (res.ok) {
          const data = await res.json();
          addMessage(data.response, 'bot', data.intent);
        } else {
          addMessage('Sorry, something went wrong. Please try again.', 'bot', null);
        }
      } catch (e) {
        typingDiv.remove();
        addMessage('Could not reach the assistant. Please try again.', 'bot', null);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
